<!-- Radio Observatory Component -->
<section id="radio-observatory" style="border:1px solid #ff440033;padding:1.5rem;margin:1rem 0;border-radius:6px;">
  <h2 style="color:#ff6622;letter-spacing:0.2em;">📡 RADIO OBSERVATORY</h2>
  <div style="margin-top:1rem;">
    <div style="margin-bottom:0.75rem;">
      <div style="font-size:0.75rem;color:#aa4400;letter-spacing:0.1em;margin-bottom:0.25rem;">HYDROGEN 21CM</div>
      <div style="background:#1a0a00;height:8px;border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:72%;background:#ff6622;animation:radio-pulse 1.8s ease-in-out infinite;"></div>
      </div>
    </div>
    <div style="margin-bottom:0.75rem;">
      <div style="font-size:0.75rem;color:#aa4400;letter-spacing:0.1em;margin-bottom:0.25rem;">AM STATION</div>
      <div style="background:#1a0a00;height:8px;border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:45%;background:#ff6622;animation:radio-pulse 2.4s ease-in-out infinite;"></div>
      </div>
    </div>
    <div>
      <div style="font-size:0.75rem;color:#aa4400;letter-spacing:0.1em;margin-bottom:0.25rem;">SIGNAL STRENGTH</div>
      <div style="background:#1a0a00;height:8px;border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:88%;background:#ff6622;animation:radio-pulse 1.2s ease-in-out infinite;"></div>
      </div>
    </div>
  </div>
  <style>
    @keyframes radio-pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  </style>
</section>
